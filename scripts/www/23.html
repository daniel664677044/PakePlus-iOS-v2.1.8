                type: "单选题",
                content: "若该项工作需要延时,工作负责人吴XX应该在工作批准时限前()向()申请办理许可手续，除（）以外的只能延时一次。",
                options: [
                    "A．1，工作签发人，线路第一种工作票",
                    "B．1，工作许可人，线路第一种工作票",
                    "C．2，工作签发人，紧急抢修工作票",
                    "D．2，工作许可人，紧急抢修工作票"

       // 应用状态
        let currentQuestionIndex = 0;
        let answeredCount = 0;
        let correctCount = 0;

        // DOM元素
        const questionNumberElement = document.getElementById('current-question-number');
        const questionTypeElement = document.getElementById('question-type');
        const questionContentElement = document.getElementById('question-content');
        const optionsContainerElement = document.getElementById('options-container');
        const feedbackElement = document.getElementById('feedback');
        const feedbackTitleElement = document.getElementById('feedback-title');
        const feedbackContentElement = document.getElementById('feedback-content');
        const correctAnswerElement = document.getElementById('correct-answer');
        const prevBtn = document.getElementById('prev-btn');
        const submitBtn = document.getElementById('submit-btn');
        const nextBtn = document.getElementById('next-btn');
        const progressTextElement = document.getElementById('progress-text');
        const progressFillElement = document.getElementById('progress-fill');
        const answeredTextElement = document.getElementById('answered-text');
        const accuracyTextElement = document.getElementById('accuracy-text');
        const scoreTextElement = document.getElementById('score-text');
        const finalScoreElement = document.getElementById('final-score');
        const questionNavElement = document.getElementById('question-nav');

        // 初始化
        document.addEventListener('DOMContentLoaded', function() {
            initQuestionNavigation();
            loadQuestion(currentQuestionIndex);
            updateStats();
            updateNavigationButtons();
        });

        // 初始化题目导航
        function initQuestionNavigation() {
            questionNavElement.innerHTML = '';
            questions.forEach((question, index) => {
                const navItem = document.createElement('div');
                navItem.className = 'question-nav-item';
                navItem.textContent = index + 1;
                navItem.addEventListener('click', () => {
                    loadQuestion(index);
                });
                questionNavElement.appendChild(navItem);
            });
        }

        // 加载题目
        function loadQuestion(index) {
            currentQuestionIndex = index;
            const question = questions[index];
            
            // 更新题目信息
            questionNumberElement.textContent = question.id;
            questionTypeElement.textContent = question.type;
            questionContentElement.textContent = question.content;
            
            // 清空选项容器
            optionsContainerElement.innerHTML = '';
            
            // 创建选项
            question.options.forEach((option, optionIndex) => {
                const optionElement = document.createElement('div');
                optionElement.className = 'option';
                
                // 如果已经回答过，显示正确/错误状态
                if (question.userAnswer !== null && 
                    !(Array.isArray(question.userAnswer) && question.userAnswer.length === 0)) {
                    const optionLetter = String.fromCharCode(65 + optionIndex);
                    
                    if (question.correctAnswer.includes(optionLetter)) {
                        optionElement.classList.add('correct');
                    } else if (
                        (question.type === '单选题' && question.userAnswer === optionLetter) ||
                        (question.type === '多选题' && question.userAnswer.includes(optionLetter))
                    ) {
                        optionElement.classList.add('incorrect');
                    }
                }
                
                // 如果用户已选择此选项，添加selected类
                if (
                    (question.type === '单选题' && question.userAnswer === String.fromCharCode(65 + optionIndex)) ||
                    (question.type === '多选题' && Array.isArray(question.userAnswer) && 
                     question.userAnswer.includes(String.fromCharCode(65 + optionIndex)))
                ) {
                    optionElement.classList.add('selected');
                }
                
                optionElement.textContent = option;
                optionElement.dataset.value = String.fromCharCode(65 + optionIndex);
                
                // 如果尚未回答，添加点击事件
                if (question.userAnswer === null || (Array.isArray(question.userAnswer) && question.userAnswer.length === 0)) {
                    optionElement.addEventListener('click', () => selectOption(optionElement, question.type));
                }
                
                optionsContainerElement.appendChild(optionElement);
            });
            
            // 更新反馈区域
            updateFeedback(question);
            
            // 更新导航按钮
            updateNavigationButtons();
            
            // 更新导航指示器
            updateNavIndicators();
            
            // 更新提交按钮状态
            updateSubmitButton();
        }

        // 选择选项
        function selectOption(optionElement, questionType) {
            const question = questions[currentQuestionIndex];
            const selectedValue = optionElement.dataset.value;
            
            if (questionType === '单选题') {
                // 清除所有选项的选中状态
                document.querySelectorAll('.option').forEach(opt => {
                    opt.classList.remove('selected');
                });
                
                // 选中当前选项
                optionElement.classList.add('selected');
                question.userAnswer = selectedValue;
            } else if (questionType === '多选题') {
                // 切换选中状态
                if (optionElement.classList.contains('selected')) {
                    optionElement.classList.remove('selected');
                    const index = question.userAnswer.indexOf(selectedValue);
                    if (index > -1) {
                        question.userAnswer.splice(index, 1);
                    }
                } else {
                    optionElement.classList.add('selected');
                    if (!question.userAnswer.includes(selectedValue)) {
                        question.userAnswer.push(selectedValue);
                    }
                }
            }
            
            // 更新提交按钮状态
            updateSubmitButton();
        }

        // 更新提交按钮状态
        function updateSubmitButton() {
            const question = questions[currentQuestionIndex];
            
            if (question.userAnswer === null || 
                (Array.isArray(question.userAnswer) && question.userAnswer.length === 0)) {
                submitBtn.disabled = true;
            } else {
                submitBtn.disabled = false;
            }
        }

        // 提交答案
        submitBtn.addEventListener('click', function() {
            const question = questions[currentQuestionIndex];
            
            if (question.userAnswer === null || 
                (Array.isArray(question.userAnswer) && question.userAnswer.length === 0)) {
                return;
            }
            
            // 检查答案
            let isCorrect = false;
            
            if (question.type === '单选题') {
                isCorrect = question.userAnswer === question.correctAnswer[0];
            } else if (question.type === '多选题') {
                // 多选题需要完全匹配
                if (question.userAnswer.length === question.correctAnswer.length) {
                    isCorrect = question.userAnswer.every(answer => 
                        question.correctAnswer.includes(answer));
                }
            }
            
            question.isCorrect = isCorrect;
            
            // 更新统计
            if (question.isCorrect) {
                correctCount++;
            }
            
            answeredCount = questions.filter(q => q.userAnswer !== null && 
                !(Array.isArray(q.userAnswer) && q.userAnswer.length === 0)).length;
            
            // 重新加载当前题目以显示正确答案
            loadQuestion(currentQuestionIndex);
            
            // 更新统计信息
            updateStats();
        });

        // 更新反馈区域
        function updateFeedback(question) {
            if (question.userAnswer === null || 
                (Array.isArray(question.userAnswer) && question.userAnswer.length === 0)) {
                feedbackElement.className = 'feedback';
                return;
            }
            
            if (question.isCorrect) {
                feedbackElement.className = 'feedback correct';
                feedbackTitleElement.textContent = '回答正确！';
                feedbackContentElement.textContent = '您已正确回答了此题。';
                correctAnswerElement.textContent = '';
            } else {
                feedbackElement.className = 'feedback incorrect';
                feedbackTitleElement.textContent = '回答错误！';
                feedbackContentElement.textContent = '您的答案不正确，正确答案如下：';
                
                // 显示正确答案
                let correctAnswerText = '';
                if (question.type === '单选题') {
                    correctAnswerText = question.correctAnswer[0];
                } else if (question.type === '多选题') {
                    correctAnswerText = question.correctAnswer.join('、');
                }
                
                correctAnswerElement.textContent = `正确答案：${correctAnswerText}`;
            }
        }

        // 更新统计信息
        function updateStats() {
            const totalQuestions = questions.length;
            const progressPercentage = ((currentQuestionIndex + 1) / totalQuestions) * 100;
            const accuracy = answeredCount > 0 ? Math.round((correctCount / answeredCount) * 100) : 0;
            const score = correctCount;
            
            progressTextElement.textContent = `${currentQuestionIndex + 1}/${totalQuestions}`;
            progressFillElement.style.width = `${progressPercentage}%`;
            answeredTextElement.textContent = `${answeredCount}`;
            accuracyTextElement.textContent = `${accuracy}%`;
            scoreTextElement.textContent = `${score}`;
            finalScoreElement.textContent = `${score}`;
        }

        // 更新导航按钮
        function updateNavigationButtons() {
            prevBtn.disabled = currentQuestionIndex === 0;
            nextBtn.disabled = currentQuestionIndex === questions.length - 1;
            
            // 如果当前题目已回答，启用下一题按钮
            const question = questions[currentQuestionIndex];
            if (question.userAnswer !== null && 
                !(Array.isArray(question.userAnswer) && question.userAnswer.length === 0)) {
                nextBtn.disabled = false;
            }
        }

        // 更新导航指示器
        function updateNavIndicators() {
            const navItems = document.querySelectorAll('.question-nav-item');
            navItems.forEach((item, index) => {
                item.classList.remove('current', 'answered', 'answered-incorrect');
                
                if (index === currentQuestionIndex) {
                    item.classList.add('current');
                }
                
                const question = questions[index];
                if (question.userAnswer !== null && 
                    !(Array.isArray(question.userAnswer) && question.userAnswer.length === 0)) {
                    
                    if (question.isCorrect === true) {
                        item.classList.add('answered');
                    } else if (question.isCorrect === false) {
                        item.classList.add('answered-incorrect');
                    }
                }
            });
        }

        // 上一题按钮事件
        prevBtn.addEventListener('click', function() {
            if (currentQuestionIndex > 0) {
                loadQuestion(currentQuestionIndex - 1);
            }
        });

        // 下一题按钮事件
        nextBtn.addEventListener('click', function() {
            if (currentQuestionIndex < questions.length - 1) {
                loadQuestion(currentQuestionIndex + 1);
            }
        });
    </script>
